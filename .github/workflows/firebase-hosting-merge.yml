# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Algolia secrets
        run: |
          if [ -z "$VITE_ALGOLIA_APP_ID" ] || [ -z "$VITE_ALGOLIA_SEARCH_KEY" ]; then
            echo "Missing Algolia secrets. Set VITE_ALGOLIA_APP_ID and VITE_ALGOLIA_SEARCH_KEY in GitHub repository secrets."
            exit 1
          fi
        env:
          VITE_ALGOLIA_APP_ID: ${{ secrets.VITE_ALGOLIA_APP_ID }}
          VITE_ALGOLIA_SEARCH_KEY: ${{ secrets.VITE_ALGOLIA_SEARCH_KEY }}
      - name: Select deploy authentication mode
        id: auth_mode
        run: |
          if [ -n "$GCP_WIF_PROVIDER" ] && [ -n "$GCP_SERVICE_ACCOUNT" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_FILDICT" ] || [ -n "$FIREBASE_SERVICE_ACCOUNT_DIKSIYONARYO" ]; then
            echo "mode=service_account_json" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "mode=firebase_token" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "No Firebase deploy auth found. Configure one of:"
          echo "1) OIDC: GCP_WIF_PROVIDER + GCP_SERVICE_ACCOUNT (vars or secrets)"
          echo "2) Service account JSON secret: FIREBASE_SERVICE_ACCOUNT_FILDICT or FIREBASE_SERVICE_ACCOUNT_DIKSIYONARYO"
          echo "3) FIREBASE_TOKEN secret"
          exit 1
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER || secrets.GCP_WIF_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT || secrets.GCP_SERVICE_ACCOUNT }}
          FIREBASE_SERVICE_ACCOUNT_FILDICT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FILDICT }}
          FIREBASE_SERVICE_ACCOUNT_DIKSIYONARYO: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIKSIYONARYO }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      - name: Authenticate to Google Cloud (OIDC)
        if: ${{ steps.auth_mode.outputs.mode == 'oidc' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER || secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT || secrets.GCP_SERVICE_ACCOUNT }}
      - name: Authenticate using Firebase service account JSON secret
        if: ${{ steps.auth_mode.outputs.mode == 'service_account_json' }}
        run: |
          SA_JSON="$FIREBASE_SERVICE_ACCOUNT_FILDICT"
          if [ -z "$SA_JSON" ]; then
            SA_JSON="$FIREBASE_SERVICE_ACCOUNT_DIKSIYONARYO"
          fi
          CREDS_FILE="$RUNNER_TEMP/gcp-sa.json"
          printf '%s' "$SA_JSON" > "$CREDS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> "$GITHUB_ENV"
        env:
          FIREBASE_SERVICE_ACCOUNT_FILDICT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FILDICT }}
          FIREBASE_SERVICE_ACCOUNT_DIKSIYONARYO: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIKSIYONARYO }}
      - run: npm ci && npm run build
        env:
          VITE_ALGOLIA_APP_ID: ${{ secrets.VITE_ALGOLIA_APP_ID }}
          VITE_ALGOLIA_SEARCH_KEY: ${{ secrets.VITE_ALGOLIA_SEARCH_KEY }}
      - name: Deploy to Firebase Hosting (live)
        run: npx firebase-tools deploy --only hosting --project fildict --non-interactive
        env:
          FIREBASE_TOKEN: ${{ steps.auth_mode.outputs.mode == 'firebase_token' && secrets.FIREBASE_TOKEN || '' }}
